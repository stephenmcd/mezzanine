name: Test and release

# Fires on all incoming commits
on:
  pull_request:
  push:

jobs:

  # Test all supported Python & Django versions
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 5.2
          - tox-env: "py310-dj52"
            python-version: "3.10"
          - tox-env: "py311-dj52"
            python-version: "3.11"
          - tox-env: "py312-dj52"
            python-version: "3.12"
          - tox-env: "py312-dj52"
            python-version: "3.13"
          - tox-env: "py312-dj52"
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -U pip tox
      - name: Run tests
        run: tox -e ${{ matrix.tox-env }}
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        with:
          report_paths: '**/junit/TEST-*.xml'

  # Lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Install dependencies
        run: pip install tox -U pip
      - name: Lint
        run: tox -e package -e lint -e pyupgrade

  # Create a new semantic release
  # Only runs on the original repo, not forks
  release:
    if: github.repository_owner == 'stephenmcd'
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@latest
      - uses: actions/setup-python@6

        with:
          python-version: 3.9
      - uses: actions/setup-node@v6
      - uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 18
          extra_plugins: |
            @semantic-release/exec@6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # Build and deploy docs  
  docs:
    if: github.ref == 'refs/heads/stable'
    needs: release
    name: build and deploy docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Install deps
        run: pip install -e . && pip install sphinx
      - uses: actions-ecosystem/action-get-latest-tag@v1
        id: get-latest-tag
        with:
          semver_only: true
      - name: Get release tag
        run: echo "RELEASE_TAG=${{ steps.get-latest-tag.outputs.tag }}" >> $GITHUB_ENV
      - name: Build docs
        run: sphinx-build -b html docs docs/build
      - name: Deploy to GitHub Pages
        if: success()
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: gh-pages
          build_dir: docs/build
          fqdn: mezzanine.jupo.org
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}